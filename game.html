<!-- game.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道牌斗法：气运争锋 - 牌局间歇</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #1a0f0a;
            color: #f0e6d2;
            font-family: 'Microsoft YaHei', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: linear-gradient(145deg, #2a1a10, #1a0f0a);
            border: 2px solid #8b6914;
            border-radius: 20px;
            padding: 30px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 0 30px rgba(139, 105, 20, 0.3);
        }
        h1 {
            text-align: center;
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        .subtitle {
            text-align: center;
            color: #8b6914;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #8b6914;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .info-card .label {
            color: #8b6914;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .info-card .value {
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            margin-top: 5px;
        }
        .info-card .value.danger {
            color: #ff6b6b;
        }
        .info-card.full-width {
            grid-column: span 2;
        }
        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 8px;
            margin: 8px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s;
        }
        .story-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #8b6914;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 130px;
            overflow-y: auto;
        }
        .story-section .label {
            color: #8b6914;
            font-size: 11px;
            margin-bottom: 6px;
        }
        .story-section p {
            color: #d4c5a9;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
        }
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .action-btn {
            background: linear-gradient(145deg, #3a2510, #2a1a0a);
            border: 1px solid #8b6914;
            border-radius: 10px;
            padding: 16px;
            color: #f0e6d2;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .action-btn:hover {
            background: linear-gradient(145deg, #4a3520, #3a2510);
            border-color: #ffd700;
            transform: translateY(-2px);
        }
        .action-btn.primary {
            background: linear-gradient(145deg, #8b6914, #6b4f0a);
            border-color: #ffd700;
        }
        .action-btn.primary:hover {
            background: linear-gradient(145deg, #9b7924, #7b5f1a);
        }
        .action-btn.danger {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        .action-btn.danger:hover {
            background: rgba(255, 107, 107, 0.1);
        }
        .action-btn.full-width {
            grid-column: span 2;
        }
        .modal-overlay {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #2a1a10;
            border: 2px solid #8b6914;
            border-radius: 15px;
            padding: 25px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }
        .modal-box h3 {
            color: #ffd700;
            margin-bottom: 15px;
        }
        .modal-box p {
            color: #d4c5a9;
            margin-bottom: 18px;
            white-space: pre-line;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .modal-buttons button {
            padding: 10px 22px;
            border-radius: 8px;
            border: 1px solid #8b6914;
            background: #3a2510;
            color: #f0e6d2;
            cursor: pointer;
            font-size: 14px;
        }
        .modal-buttons button:hover {
            background: #4a3520;
        }
        .modal-buttons button.confirm {
            background: #8b6914;
            border-color: #ffd700;
        }
        .modal-buttons button.confirm:hover {
            background: #9b7924;
        }
        .slot-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #8b6914;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            cursor: pointer;
            transition: background 0.2s;
            text-align: left;
        }
        .slot-item:hover {
            background: rgba(139, 105, 20, 0.3);
        }
        .slot-item .slot-name {
            color: #ffd700;
            font-weight: bold;
        }
        .slot-item .slot-info {
            color: #aaa;
            font-size: 13px;
            margin-top: 4px;
        }
        .slot-item.empty {
            color: #777;
            font-style: italic;
            cursor: default;
        }
        .slot-item.empty:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .hidden { display: none; }
        @media (max-width: 550px) {
            .info-grid { grid-template-columns: 1fr; }
            .action-buttons { grid-template-columns: 1fr; }
            .info-card.full-width { grid-column: span 1; }
            .action-btn.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>道牌斗法：气运争锋</h1>
    <div class="subtitle">—— 牌局间歇 ——</div>

    <div class="info-grid">
        <div class="info-card">
            <div class="label">修士</div>
            <div class="value" id="player-name">--</div>
        </div>
        <div class="info-card">
            <div class="label">职业</div>
            <div class="value" id="player-profession">--</div>
        </div>
        <div class="info-card">
            <div class="label">剩余气运（筹码）</div>
            <div class="value danger" id="player-chips">--</div>
        </div>
        <div class="info-card">
            <div class="label">赛事进度</div>
            <div class="value" id="tournament-progress">--</div>
        </div>
        <div class="info-card full-width">
            <div class="label">剩余修士</div>
            <div class="value" id="remaining-players">--</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <div class="story-section">
        <div class="label">你的过往</div>
        <p id="player-story">--</p>
    </div>

    <div class="action-buttons">
        <button class="action-btn primary" onclick="startNextRound()">开始下一局</button>
        <button class="action-btn" onclick="openSaveModal()">保存进度</button>
        <button class="action-btn" onclick="openLoadModal()">读取进度</button>
        <button class="action-btn" onclick="confirmReturnMenu()" style="border-color: #ff6b6b; color: #ff6b6b;">返回主选单</button>
        <button class="action-btn full-width" onclick="showRules()">📖 玩法说明</button>
    </div>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal-box" id="modal-box">
        <h3 id="modal-title">提示</h3>
        <p id="modal-message">内容</p>
        <div class="modal-buttons" id="modal-buttons"></div>
    </div>
</div>

<script src="js/storage.js"></script>
<script>
// ===== 当前存档数据 =====
let currentSave = null;
let currentSlotIndex = -1;

// ===== 页面加载 =====
window.onload = function() {
    const currentUser = getCurrentUser();
    if (!currentUser) {
        window.location.href = 'index.html';
        return;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const slotParam = urlParams.get('slot');
    if (slotParam === null) {
        alert('没有指定存档，返回主选单。');
        window.location.href = 'menu.html';
        return;
    }

    currentSlotIndex = parseInt(slotParam);
    const saves = getSaveSlots();
    currentSave = saves[currentSlotIndex];

    if (!currentSave) {
        alert('存档数据丢失，返回主选单。');
        window.location.href = 'menu.html';
        return;
    }

    updateDisplay();
};

// ===== 更新界面 =====
function updateDisplay() {
    if (!currentSave) return;

    document.getElementById('player-name').textContent = currentSave.playerName || '无名修士';
    document.getElementById('player-profession').textContent = currentSave.profession || '未知';
    document.getElementById('player-chips').textContent = (currentSave.chips || 0).toLocaleString();
    document.getElementById('player-story').textContent = currentSave.characterDesc || '暂无记录';

    const round = currentSave.round || 1;
    const totalRounds = currentSave.totalRounds || 5;
    document.getElementById('tournament-progress').textContent = `第 ${round} / ${totalRounds} 局`;

    const remainingPlayers = Math.max(2, 9 - (round - 1));
    document.getElementById('remaining-players').textContent = remainingPlayers + ' 人';

    const progressPercent = ((round - 1) / (totalRounds - 1)) * 100;
    document.getElementById('progress-fill').style.width = Math.min(progressPercent, 100) + '%';
}

// ===== 开始下一局 =====
function startNextRound() {
    if (!currentSave) return;

    if (currentSave.chips <= 0) {
        showModal('气运已尽', '你的筹码已经归零，无法继续比赛。', [
            { text: '读取存档', action: () => { openLoadModal(); } },
            { text: '返回主选单', action: () => { window.location.href = 'menu.html'; } }
        ]);
        return;
    }

    if (currentSave.round > currentSave.totalRounds) {
        showModal('恭喜飞升', '你已经赢得了所有比赛，成功飞升上界！', [
            { text: '返回主选单', action: () => { window.location.href = 'menu.html'; } }
        ]);
        return;
    }

    // 跳转到对战页面，传入存档索引和当前局数
    window.location.href = 'battle.html?slot=' + currentSlotIndex + '&round=' + currentSave.round;
}
// ===== 打开保存存档弹窗 =====
function openSaveModal() {
    const saves = getSaveSlots();
    let slotsHtml = '';

    saves.forEach((save, index) => {
        if (save) {
            slotsHtml += `
                <div class="slot-item" onclick="selectSaveSlot(${index})">
                    <div class="slot-name">${save.playerName || '无名修士'}</div>
                    <div class="slot-info">职业: ${save.profession || '未知'} | 气运: ${(save.chips || 0).toLocaleString()} | 进度: 第${save.round || 1}局</div>
                </div>
            `;
        } else {
            slotsHtml += `
                <div class="slot-item empty" onclick="selectSaveSlot(${index})">
                    存档${index + 1}：空空如也
                </div>
            `;
        }
    });

    showModal('保存进度 - 选择存档位', slotsHtml, [
        { text: '取消', action: () => {} }
    ]);
}

// ===== 选择保存到哪个槽位 =====
function selectSaveSlot(slotIndex) {
    closeModal();
    showModal('确认保存', `确定要保存到存档${slotIndex + 1}吗？`, [
        { text: '取消', action: () => {} },
        { text: '确认保存', action: () => {
            if (currentSave) {
                currentSave.playDuration = Math.floor((Date.now() - (currentSave.startTime || Date.now())) / 1000);
                saveToSlot(slotIndex, currentSave);
                showModal('保存成功', '存档已保存。', [{ text: '确定', action: () => {} }]);
            }
        }, isConfirm: true }
    ]);
}

// ===== 打开读取存档弹窗 =====
function openLoadModal() {
    const saves = getSaveSlots();
    let slotsHtml = '';

    saves.forEach((save, index) => {
        if (save) {
            slotsHtml += `
                <div class="slot-item" onclick="selectLoadSlot(${index})">
                    <div class="slot-name">${save.playerName || '无名修士'}</div>
                    <div class="slot-info">职业: ${save.profession || '未知'} | 气运: ${(save.chips || 0).toLocaleString()} | 进度: 第${save.round || 1}局</div>
                </div>
            `;
        } else {
            slotsHtml += `
                <div class="slot-item empty">
                    存档${index + 1}：空空如也
                </div>
            `;
        }
    });

    showModal('读取进度 - 选择存档', slotsHtml, [
        { text: '取消', action: () => {} }
    ]);
}

// ===== 选择读取哪个槽位 =====
function selectLoadSlot(slotIndex) {
    closeModal();
    showModal('确认读取', '读取存档将覆盖当前未保存的进度，确定吗？', [
        { text: '取消', action: () => {} },
        { text: '确认读取', action: () => {
            const saves = getSaveSlots();
            const saveData = saves[slotIndex];
            if (saveData) {
                currentSave = saveData;
                currentSlotIndex = slotIndex;
                updateDisplay();
                showModal('读取成功', '存档已加载。', [{ text: '确定', action: () => {} }]);
            } else {
                showModal('读取失败', '该存档位没有数据。', [{ text: '确定', action: () => {} }]);
            }
        }, isConfirm: true }
    ]);
}

// ===== 玩法说明 =====
function showRules() {
    showModal('玩法说明', 
        '以最权威的 WSOP $10,000 无限注德州扑克主赛事为标准蓝本。\n\n' +
        '• 每局9人桌，逐轮淘汰\n' +
        '• 最终进入决赛桌争夺冠军\n' +
        '• 赢光所有对手的筹码即为飞升成功\n' +
        '• 筹码归零则为身死道消\n\n' +
        'GM命令（开发调试用）：\n' +
        '/add_chips [数量] - 增加筹码\n' +
        '/skip_hand - 跳过当前对局\n' +
        '/win_tournament - 直接获胜',
        [{ text: '知道了', action: () => {} }]
    );
}

// ===== 返回主选单（二次确认） =====
function confirmReturnMenu() {
    showModal('确认返回', '返回主选单后，当前进度将自动保存。', [
        { text: '取消', action: () => {} },
        { text: '确认返回', action: () => { 
            if (currentSave) {
                currentSave.playDuration = Math.floor((Date.now() - (currentSave.startTime || Date.now())) / 1000);
                saveToSlot(currentSlotIndex, currentSave);
            }
            window.location.href = 'menu.html';
        }, isConfirm: true }
    ]);
}

// ===== 弹窗系统 =====
function showModal(title, content, buttons) {
    const overlay = document.getElementById('modal-overlay');
    const titleEl = document.getElementById('modal-title');
    const messageEl = document.getElementById('modal-message');
    const buttonsEl = document.getElementById('modal-buttons');

    titleEl.textContent = title;

    if (content.startsWith('<')) {
        messageEl.innerHTML = content;
    } else {
        messageEl.textContent = content;
    }

    buttonsEl.innerHTML = '';
    buttons.forEach(btn => {
        const button = document.createElement('button');
        button.textContent = btn.text;
        if (btn.isConfirm) {
            button.className = 'confirm';
        }
        button.onclick = function() {
            closeModal();
            if (btn.action) btn.action();
        };
        buttonsEl.appendChild(button);
    });

    overlay.classList.add('active');
}

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
}
</script>
</body>
</html>
