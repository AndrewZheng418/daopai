<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道牌斗法：气运争锋</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-wrap">
  <h2>道牌斗法：气运争锋</h2>

  <div id="login-box">
    <form id="login-form">
      <div class="form-row">
        <label>账号 ID</label>
        <input type="text" id="login-userid" placeholder="仅限小写英文和数字" required>
      </div>
      <div class="form-row">
        <label>密码</label>
        <div style="position:relative;">
          <input type="password" id="login-password" required style="padding-right: 36px;">
          <span id="toggle-login-pw" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; user-select:none;">👁️</span>
        </div>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button type="submit" class="btn-primary">登录</button>
    </form>
    <button class="btn-secondary" id="show-register">注册新账号</button>
  </div>

  <div id="register-box" class="hidden">
    <form id="register-form">
      <div class="form-row">
        <label>新账号 ID</label>
        <input type="text" id="reg-userid" placeholder="仅限小写英文和数字，最大32位" required>
      </div>
      <div class="form-row">
        <label>设置密码</label>
        <div style="position:relative;">
          <input type="password" id="reg-password" placeholder="字母、数字、下划线，最长20位" required style="padding-right: 36px;">
          <span id="toggle-reg-pw" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; user-select:none;">👁️</span>
        </div>
      </div>
      <div class="form-row">
        <label>道号（显示名称）</label>
        <input type="text" id="reg-display" placeholder="2-6个字符" maxlength="6">
      </div>
      <div class="error-msg" id="register-error"></div>
      <button type="submit" class="btn-primary">创建</button>
      <button type="button" class="btn-secondary" id="show-login">返回登录</button>
    </form>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script>
  document.getElementById('toggle-login-pw').addEventListener('click', function() {
    const input = document.getElementById('login-password');
    input.type = input.type === 'password' ? 'text' : 'password';
    this.textContent = input.type === 'password' ? '👁️' : '🙈';
  });
  document.getElementById('toggle-reg-pw').addEventListener('click', function() {
    const input = document.getElementById('reg-password');
    input.type = input.type === 'password' ? 'text' : 'password';
    this.textContent = input.type === 'password' ? '👁️' : '🙈';
  });

  document.getElementById('show-register').addEventListener('click', () => {
    document.getElementById('login-box').classList.add('hidden');
    document.getElementById('register-box').classList.remove('hidden');
  });
  document.getElementById('show-login').addEventListener('click', () => {
    document.getElementById('register-box').classList.add('hidden');
    document.getElementById('login-box').classList.remove('hidden');
  });

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const userId = document.getElementById('login-userid').value.trim().toLowerCase();
    const password = document.getElementById('login-password').value;
    document.getElementById('login-error').textContent = '';
    try {
      await login(userId, password);
      window.location.href = 'menu.html';
    } catch (err) {
      document.getElementById('login-error').textContent = err.message;
    }
  });

  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const userId = document.getElementById('reg-userid').value.trim().toLowerCase();
    const password = document.getElementById('reg-password').value;
    const displayName = document.getElementById('reg-display').value.trim();
    document.getElementById('register-error').textContent = '';
    try {
      await register(userId, password, displayName || userId);
      window.location.href = 'menu.html';
    } catch (err) {
      document.getElementById('register-error').textContent = err.message;
    }
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
